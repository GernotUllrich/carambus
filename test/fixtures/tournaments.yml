# Tournaments for testing
#
# InternationalTournament fixtures (STI subclass) live here too.
# They require type: "InternationalTournament" and an international_source.

# World Cup 2024 - used in video/tournament_matcher_test.rb
# IDs use 50_002_xxx range to avoid conflicts with inline Tournament.create!(id: 50_000_010/011...)
# calls in source_handler_test.rb.
wc_2024:
  id: 50_002_001
  type: "InternationalTournament"
  title: "UMB World Cup 2024 Antwerp"
  season: current
  organizer: nbv (Region)
  organizer_type: "Region"
  discipline: carom_3band
  state: "registration"
  date: <%= Date.new(2024, 9, 1) %>
  end_date: <%= Date.new(2024, 9, 7) %>
  international_source: youtube_source
  created_at: <%= 1.year.ago %>
  updated_at: <%= 1.day.ago %>

# World Cup without end_date - used to test 7-day fallback
# date is dynamic (18 months ago) to stay within the matcher's 2-year lookback window
wc_no_end_date:
  id: 50_002_002
  type: "InternationalTournament"
  title: "UMB World Cup Hurghada"
  season: current
  organizer: nbv (Region)
  organizer_type: "Region"
  discipline: carom_3band
  state: "registration"
  date: <%= 18.months.ago.to_date %>
  international_source: youtube_source
  created_at: <%= 2.years.ago %>
  updated_at: <%= 1.day.ago %>



# Local tournament (id >= 50M)
local:
  id: 50_000_001
  title: "Local Test Tournament"
  # FK rot repair (260506-i6h): the fixture-relation syntax `season: current` /
  # `organizer: nbv (Region)` does NOT resolve to seasons(:current).id (50_000_001) /
  # regions(:nbv).id (50_000_001) — Rails hashes the labels to wrong IDs. Use
  # explicit columns so tournament.organizer.shortname / .season.name resolve in
  # views (see tournaments_controller_test.rb:69-79 for the historical workaround).
  # Same hashing affects `discipline: carom_3band` and `tournament_plan: t04_5`
  # (Rule 3 deviation discovered during 260506-i6h Task 2: id_hash 329867132 vs.
  # actual disciplines(:carom_3band).id 50_000_001; id_hash 849969480 vs. actual
  # tournament_plans(:t04_5).id 50_000_100). Use explicit IDs for these too.
  season_id: 50_000_001
  organizer_id: 50_000_001
  organizer_type: "Region"
  discipline_id: 50_000_001
  # Prong A (260506-i6h): without tournament_plan, tournament_monitor.html.erb:40
  # raises NoMethodError on @tournament.tournament_plan.rulesystem. t04_5 is an
  # existing fixture (id 50_000_100, "T04", rulesystem + more_description present).
  tournament_plan_id: 50_000_100
  # AASM correctness (quick-260506-k3t): start_tournament! transitions from
  # %i[tournament_started tournament_mode_defined tournament_started_waiting_for_monitors]
  # per app/models/tournament.rb:290-292. Test setup gate at
  # tournament_parameter_verification_test.rb:29 excludes tournament_started, so
  # tournament_mode_defined is the only viable pre-start state for tests 3+4.
  # ("registration" was a stray label not in the AASM state list.)
  state: "tournament_mode_defined"
  date: <%= 2.weeks.from_now %>
  created_at: <%= 1.month.ago %>
  updated_at: <%= 1.day.ago %>

# Imported tournament (id < 50M) - would be readonly in production
imported:
  id: 1000
  title: "Imported API Tournament"
  season: current
  organizer: nbv (Region)
  organizer_type: "Region"
  discipline: pool_8ball
  state: "tournament_started"
  date: <%= 1.week.ago %>
  created_at: <%= 3.months.ago %>
  updated_at: <%= 1.week.ago %>

# Tournament with source_url for scraping tests
scraped:
  id: 50_000_002
  title: "Scraped Tournament"
  season: current
  organizer: nbv (Region)
  organizer_type: "Region"
  discipline: carom_3band
  state: "registration"
  source_url: "https://nbv.clubcloud.de/sb_meisterschaft.php?p=20--2025-123-0--2-1-100000-"
  sync_date: <%= 1.day.ago %>
  created_at: <%= 1.month.ago %>
  updated_at: <%= 1.day.ago %>

