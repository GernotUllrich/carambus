# Phase 39 D-16 fixture rows for parameter_ranges tests.
# Discipline IDs reference disciplines.yml; tournament_plan_ids reference tournament_plans.yml.
# Test DB is rebuilt from these fixtures, so global ID range (id < 50_000_000) is safe.

# D-16(a) DTP-Hit Normal: Freie Partie klein, plan t04_5 (5 players), class "1"
# Used to assert ranges = {balls_goal: 187..250, innings_goal: 11..15}
# (250*0.75 = 187.5 -> floor 187; 15*0.75 = 11.25 -> floor 11)
fpk_t04_5_class1:
  id: 9_000_001
  discipline_id: 50_000_004    # disciplines(:discipline_freie_partie_klein)
  tournament_plan_id: 50_000_100  # tournament_plans(:t04_5)
  players: 5
  player_class: "1"
  points: 250
  innings: 15
  created_at: <%= 1.year.ago %>
  updated_at: <%= 1.day.ago %>

# D-16(b) Class-Walk: same (discipline, plan, players=5) but class "3" — used to walk from "5" -> "3"
fpk_t04_5_class3:
  id: 9_000_002
  discipline_id: 50_000_004
  tournament_plan_id: 50_000_100
  players: 5
