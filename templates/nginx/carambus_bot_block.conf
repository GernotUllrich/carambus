# Carambus Bot-Blockliste — UA-basierte Abweisung am Edge.
# 2026-04-27. Ergänzt das Disallow:/ in /robots.txt für Bad-Actor-Bots,
# die robots.txt ignorieren.
#
# Source: carambus_master/templates/nginx/carambus_bot_block.conf
# Install:
#   sudo cp <source> /etc/nginx/conf.d/carambus_bot_block.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Verwendung in Scenario-nginx-Configs:
#   if ($carambus_block_bot) { return 403 "Forbidden\n"; }
#
# Deaktivieren pro Scenario: bot_block_enabled: false in config.yml setzen
# (z. B. carambus.de, das gescraped werden darf).

map $http_user_agent $carambus_block_bot {
    default                                                       0;

    # Generische Crawler-Patterns (case-insensitive)
    "~*(bot|crawler|spider|scraper|wget|curl/|python-requests)"   1;

    # Bekannte SEO/Marketing-Crawler (ignorieren oft robots.txt)
    "~*(AhrefsBot|SemrushBot|DotBot|MJ12Bot|PetalBot|YandexBot|Bytespider)" 1;

    # AI/LLM-Trainings-Crawler (eigenes Disallow per UA)
    "~*(GPTBot|ClaudeBot|ChatGPT-User|CCBot|anthropic-ai|Claude-Web|cohere-ai|Diffbot|FacebookBot|Google-Extended|PerplexityBot)" 1;

    # Leerer User-Agent (typisch für Skript-Spam)
    ""                                                            1;
}
