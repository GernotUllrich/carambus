# .overcommit.yml — Managed by bundle exec overcommit --install
#
# Activation (one-time, per fresh clone):
#   bundle exec overcommit --install
#   bundle exec overcommit --sign
#
# Re-sign after every edit of this file:
#   bundle exec overcommit --sign
#
# Bypass a single commit (emergencies only):
#   SKIP=MkDocsBuild git commit -m "..."
#
# This config intentionally enables ONLY the MkDocsBuild hook. Overcommit
# ships with several hooks auto-enabled (AuthorEmail, AuthorName,
# BrokenSymlinks, CaseConflicts, MergeConflicts, …); these are explicitly
# disabled below so this file stays scoped to ONE responsibility: the G-02
# hardening hook. The project already runs RuboCop, Brakeman, and erblint
# through dedicated paths — re-enabling them here would broaden scope and
# could false-positive on pre-existing repo layout (e.g. intentional
# symlinks to external dev tooling living outside the repo root).

PreCommit:
  ALL:
    quiet: false

  # Disable all overcommit built-in default hooks. This file intentionally
  # scopes overcommit to ONE purpose (G-02 hardening) and nothing else.
  # The project already runs RuboCop, Brakeman, erblint, and other checks
  # through dedicated paths. Re-enabling these here would broaden the scope
  # of this hook file beyond its single responsibility and could false-
  # positive on pre-existing repo layout (e.g. intentional symlinks to
  # external dev tooling outside the repo root).
  AuthorEmail:
    enabled: false
  AuthorName:
    enabled: false
  BrokenSymlinks:
    enabled: false
  CaseConflicts:
    enabled: false
  MergeConflicts:
    enabled: false

  MkDocsBuild:
    enabled: true
    required: true
    description: 'Rebuild public/docs/ when docs/**/*.md changes (G-02 hardening)'
    include:
      - 'docs/**/*.md'
    command: ['bin/overcommit/mkdocs-build-on-docs-change']
